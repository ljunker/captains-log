<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f5f5f2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Captain's Log">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="manifest" href="{{ manifest_path }}">
    <link rel="apple-touch-icon" href="{{ apple_touch_icon_path }}">
    <title>{{ app_name }}</title>
    <style>{{ inline_css | safe }}</style>
</head>
<body>
<main class="shell">
    <section class="entries-shell">
        <div class="entries-head">
            <div class="entries-title">
                <p class="eyebrow">Tagesansicht</p>
                <h1 id="day-label">Dein Logbuch</h1>
                <p id="entry-count" class="entry-count"></p>
                <p id="network-status" class="network-status hidden">Offline-Modus aktiv</p>
            </div>
            <div class="entries-toolbar">
                <a class="ghost-link toolbar-docs-link" href="{{ docs_path }}">Swagger</a>
                <button type="button" id="previous-day-button" class="secondary toolbar-button" aria-label="Tag zurück">
                    <span class="toolbar-label-desktop">← Tag zurück</span>
                    <span class="toolbar-label-mobile" aria-hidden="true">&lt;-</span>
                </button>
                <button type="button" id="next-day-button" class="secondary toolbar-button" aria-label="Tag vor">
                    <span class="toolbar-label-desktop">Tag vor →</span>
                    <span class="toolbar-label-mobile" aria-hidden="true">-&gt;</span>
                </button>
                <button type="button" id="refresh-button" class="secondary toolbar-button toolbar-refresh-button" aria-label="Aktualisieren" title="Aktualisieren">
                    <span class="toolbar-label-desktop">Aktualisieren</span>
                    <span class="toolbar-label-mobile toolbar-icon" aria-hidden="true">↻</span>
                </button>
                <button type="button" id="open-composer-button" class="toolbar-button" aria-label="Neuer Eintrag" title="Neuer Eintrag">
                    <span class="toolbar-label-desktop">Eintrag schreiben</span>
                    <span class="toolbar-label-mobile" aria-hidden="true">C</span>
                </button>
            </div>
        </div>
        <section class="shortcut-strip">
            <span class="shortcut-pill"><kbd>C</kbd> Neuer Eintrag</span>
            <span class="shortcut-pill"><kbd>Enter</kbd> Speichern</span>
            <span class="shortcut-pill"><kbd>Shift</kbd> + <kbd>Enter</kbd> Zeilenumbruch</span>
        </section>
        <section class="search-strip" aria-label="Volltextsuche">
            <input id="search-input" type="search" placeholder="Suche in Einträgen, Tags und Anhängen" autocomplete="off">
            <button type="button" id="clear-search-button" class="secondary hidden">Suche löschen</button>
        </section>
        <section id="tag-filter-strip" class="tag-filter-strip hidden">
            <div class="tag-filter-head">
                <p class="eyebrow">Tags</p>
                <button type="button" id="clear-tag-filter-button" class="secondary hidden">Filter löschen</button>
            </div>
            <div id="tag-filter-list" class="tag-filter-list"></div>
        </section>
        <div id="entries-list" class="entries-list"></div>
    </section>
</main>

<div id="composer-backdrop" class="composer-backdrop hidden" aria-hidden="true">
    <section class="composer-card" aria-labelledby="composer-title">
        <div class="composer-head">
            <div>
                <p id="composer-mode" class="eyebrow">Neuer Eintrag</p>
                <h2 id="composer-title">Kurz festhalten, bevor es wieder weg ist.</h2>
            </div>
            <button type="button" id="close-composer-button" class="icon-button" aria-label="Schließen">×</button>
        </div>

        <input type="hidden" id="entry-id">
        <textarea id="content" name="content" rows="8" placeholder="Was soll heute festgehalten werden?" required></textarea>
        <label class="field-group" for="created-at-input">
            <span class="field-label">Timestamp</span>
            <input id="created-at-input" name="created-at-input" type="datetime-local">
        </label>
        <label class="field-group" for="tag-entry-input">
            <span class="field-label">Tags</span>
            <input id="tags" name="tags" type="hidden">
            <div id="selected-tags" class="tag-editor-list hidden"></div>
            <div class="tag-editor-row">
                <input id="tag-entry-input" name="tag-entry-input" type="text" placeholder="z.B. arbeit, privat, python" autocomplete="off">
                <button type="button" id="add-tag-button" class="secondary tag-add-button" aria-label="Tag hinzufügen">+</button>
            </div>
            <div id="tag-suggestions" class="tag-editor-list hidden" aria-live="polite"></div>
        </label>
        <label class="field-group" for="attachment-input">
            <span class="field-label">Anhänge</span>
            <input
                id="attachment-input"
                name="attachments"
                type="file"
                accept="image/jpeg,image/png,image/webp,image/heic,image/heif,image/x-adobe-dng,image/dng,.jpg,.jpeg,.png,.webp,.heic,.heif,.dng,audio/mp4,audio/x-m4a,audio/mpeg,audio/wav,audio/aac,.m4a,.mp3,.wav,.aac"
                multiple
            >
            <p class="field-hint">Mehrere Bilder oder Audiodateien. Bilder von der iPhone-Kamera inklusive HEIC/HEIF und DNG werden unterstützt.</p>
            <div id="composer-existing-attachments" class="attachment-editor-list hidden"></div>
            <div id="composer-pending-attachments" class="attachment-editor-list hidden"></div>
        </label>

        <div class="composer-foot">
            <p id="form-status" class="status" aria-live="polite"></p>
            <div class="composer-actions">
                <button type="button" id="cancel-button" class="secondary">Abbrechen</button>
                <button type="button" id="save-button">Speichern</button>
            </div>
        </div>
    </section>
</div>

<template id="entry-template">
    <article class="entry-card">
        <div class="entry-meta">
            <div class="entry-times">
                <span class="entry-date"></span>
                <span class="entry-update hidden"></span>
            </div>
            <span class="entry-id"></span>
        </div>
        <div class="entry-tags hidden"></div>
        <p class="entry-content"></p>
        <section class="entry-attachments hidden">
            <div class="attachment-grid"></div>
            <div class="attachment-preview hidden"></div>
        </section>
        <div class="card-actions">
            <button type="button" data-action="edit">Bearbeiten</button>
            <button type="button" data-action="delete" class="danger">Löschen</button>
        </div>
    </article>
</template>

<script>
    const entryIdInput = document.getElementById("entry-id");
    const contentInput = document.getElementById("content");
    const createdAtInput = document.getElementById("created-at-input");
    const tagsInput = document.getElementById("tags");
    const tagEntryInput = document.getElementById("tag-entry-input");
    const selectedTags = document.getElementById("selected-tags");
    const addTagButton = document.getElementById("add-tag-button");
    const attachmentInput = document.getElementById("attachment-input");
    const composerExistingAttachments = document.getElementById("composer-existing-attachments");
    const composerPendingAttachments = document.getElementById("composer-pending-attachments");
    const formStatus = document.getElementById("form-status");
    const entriesList = document.getElementById("entries-list");
    const template = document.getElementById("entry-template");
    const refreshButton = document.getElementById("refresh-button");
    const previousDayButton = document.getElementById("previous-day-button");
    const nextDayButton = document.getElementById("next-day-button");
    const dayLabel = document.getElementById("day-label");
    const entryCount = document.getElementById("entry-count");
    const networkStatus = document.getElementById("network-status");
    const openComposerButton = document.getElementById("open-composer-button");
    const closeComposerButton = document.getElementById("close-composer-button");
    const cancelButton = document.getElementById("cancel-button");
    const saveButton = document.getElementById("save-button");
    const composerBackdrop = document.getElementById("composer-backdrop");
    const composerMode = document.getElementById("composer-mode");
    const composerTitle = document.getElementById("composer-title");
    const tagFilterStrip = document.getElementById("tag-filter-strip");
    const tagFilterList = document.getElementById("tag-filter-list");
    const clearTagFilterButton = document.getElementById("clear-tag-filter-button");
    const tagSuggestions = document.getElementById("tag-suggestions");
    const searchInput = document.getElementById("search-input");
    const clearSearchButton = document.getElementById("clear-search-button");
    const rootPath = {{ root_path|tojson }};
    const appTimezone = {{ app_timezone|tojson }};
    const serviceWorkerPath = {{ service_worker_path|tojson }};

    let currentDay = null;
    let previousDay = null;
    let nextDay = null;
    let activeTag = null;
    let activeSearch = null;
    let searchDebounceTimer = null;
    let latestTagSuggestionRequest = 0;
    let composerTags = [];
    let composerExistingAttachmentState = [];
    let pendingAttachmentFiles = [];

    function appUrl(path) {
        const normalizedPath = path.startsWith("/") ? path : `/${path}`;
        return `${rootPath}${normalizedPath}`;
    }

    function setStatus(message, isError = false) {
        formStatus.textContent = message;
        formStatus.classList.toggle("error", isError);
    }

    function updateNetworkStatus() {
        const offline = navigator.onLine === false;
        networkStatus.classList.toggle("hidden", !offline);
        if (offline) {
            networkStatus.textContent = "Offline-Modus aktiv";
        }
    }

    function resetComposer() {
        entryIdInput.value = "";
        contentInput.value = "";
        createdAtInput.value = "";
        createdAtInput.disabled = false;
        tagsInput.value = "";
        tagEntryInput.value = "";
        attachmentInput.value = "";
        composerTags = [];
        composerExistingAttachmentState = [];
        pendingAttachmentFiles = [];
        composerMode.textContent = "Neuer Eintrag";
        composerTitle.textContent = "Kurz festhalten, bevor es wieder weg ist.";
        renderSelectedTags();
        renderComposerExistingAttachments();
        renderPendingAttachments();
        hideTagSuggestions();
        setStatus("");
    }

    function openComposer(entry = null) {
        if (entry) {
            entryIdInput.value = entry.id;
            contentInput.value = entry.content;
            createdAtInput.value = toDateTimeLocalValue(entry.created_at);
            createdAtInput.disabled = true;
            composerTags = [...entry.tags];
            composerExistingAttachmentState = entry.attachments.map((attachment) => ({...attachment, markedForRemoval: false}));
            pendingAttachmentFiles = [];
            syncComposerTags();
            renderSelectedTags();
            renderComposerExistingAttachments();
            renderPendingAttachments();
            tagEntryInput.value = "";
            attachmentInput.value = "";
            composerMode.textContent = "Eintrag bearbeiten";
            composerTitle.textContent = `Eintrag #${entry.id} anpassen.`;
        } else {
            resetComposer();
        }

        composerBackdrop.classList.remove("hidden");
        composerBackdrop.setAttribute("aria-hidden", "false");
        window.requestAnimationFrame(() => contentInput.focus());
    }

    function closeComposer() {
        composerBackdrop.classList.add("hidden");
        composerBackdrop.setAttribute("aria-hidden", "true");
        resetComposer();
    }

    function formatTime(value) {
        return new Intl.DateTimeFormat("de-DE", {
            timeStyle: "short",
            timeZone: appTimezone,
        }).format(new Date(value));
    }

    function hasMeaningfulUpdate(createdAt, updatedAt) {
        const created = new Date(createdAt).getTime();
        const updated = new Date(updatedAt).getTime();
        return Number.isFinite(created) && Number.isFinite(updated) && Math.abs(updated - created) >= 1000;
    }

    function formatDay(value) {
        return new Intl.DateTimeFormat("de-DE", {
            weekday: "long",
            day: "2-digit",
            month: "long",
            year: "numeric",
            timeZone: appTimezone,
        }).format(new Date(`${value}T12:00:00Z`));
    }

    function toDateTimeLocalValue(value) {
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) {
            return "";
        }
        const offsetDate = new Date(date.getTime() - date.getTimezoneOffset() * 60000);
        return offsetDate.toISOString().slice(0, 16);
    }

    function updateDayButtons() {
        previousDayButton.disabled = !previousDay;
        nextDayButton.disabled = !nextDay;
        dayLabel.textContent = currentDay ? formatDay(currentDay) : "Dein Logbuch";
    }

    function parseTagsInput(value) {
        return value
            .split(",")
            .map((tag) => tag.trim())
            .filter(Boolean);
    }

    function normalizeTagInput(value) {
        return value
            .trim()
            .toLowerCase()
            .split(/\s+/)
            .filter(Boolean)
            .join(" ");
    }

    function syncComposerTags() {
        tagsInput.value = composerTags.join(", ");
    }

    function formatFileSize(value) {
        if (value < 1024 * 1024) {
            return `${Math.max(1, Math.round(value / 1024))} KB`;
        }
        return `${(value / (1024 * 1024)).toFixed(1)} MB`;
    }

    function hideTagSuggestions() {
        tagSuggestions.innerHTML = "";
        tagSuggestions.classList.add("hidden");
    }

    function renderSelectedTags() {
        selectedTags.innerHTML = "";
        selectedTags.classList.toggle("hidden", composerTags.length === 0);

        for (const tag of composerTags) {
            const button = document.createElement("button");
            button.type = "button";
            button.className = "tag-chip tag-chip-selected";
            const label = document.createElement("span");
            label.textContent = `#${tag}`;
            const removeIcon = document.createElement("span");
            removeIcon.className = "tag-chip-remove";
            removeIcon.setAttribute("aria-hidden", "true");
            removeIcon.textContent = "×";
            button.appendChild(label);
            button.appendChild(removeIcon);
            button.addEventListener("click", () => {
                composerTags = composerTags.filter((candidate) => candidate !== tag);
                syncComposerTags();
                renderSelectedTags();
                updateTagSuggestions();
            });
            selectedTags.appendChild(button);
        }
    }

    function applyTagSuggestion(tag) {
        if (composerTags.includes(tag)) {
            tagEntryInput.value = "";
            hideTagSuggestions();
            return;
        }

        composerTags = [...composerTags, tag];
        syncComposerTags();
        renderSelectedTags();
        tagEntryInput.value = "";
        hideTagSuggestions();
        tagEntryInput.focus();
    }

    function renderTagSuggestions(suggestions) {
        tagSuggestions.innerHTML = "";
        if (suggestions.length === 0) {
            tagSuggestions.classList.add("hidden");
            return;
        }

        for (const suggestion of suggestions) {
            const button = document.createElement("button");
            button.type = "button";
            button.className = "tag-chip tag-chip-button";
            button.textContent = `#${suggestion}`;
            button.addEventListener("mousedown", (event) => {
                event.preventDefault();
                applyTagSuggestion(suggestion);
            });
            tagSuggestions.appendChild(button);
        }

        tagSuggestions.classList.remove("hidden");
    }

    async function updateTagSuggestions() {
        const requestId = ++latestTagSuggestionRequest;
        const fragment = normalizeTagInput(tagEntryInput.value);

        try {
            const params = new URLSearchParams({query: fragment});
            const response = await fetch(appUrl(`/api/tags/suggestions?${params.toString()}`));
            if (!response.ok) {
                throw new Error("Tag-Vorschläge konnten nicht geladen werden.");
            }

            const suggestions = await response.json();
            if (requestId !== latestTagSuggestionRequest) {
                return;
            }

            renderTagSuggestions(
                suggestions.filter((suggestion) => !composerTags.includes(suggestion))
            );
        } catch (error) {
            if (requestId === latestTagSuggestionRequest) {
                hideTagSuggestions();
            }
        }
    }

    function addCurrentTag() {
        const normalizedTag = normalizeTagInput(tagEntryInput.value);
        if (!normalizedTag) {
            return;
        }
        applyTagSuggestion(normalizedTag);
    }

    function renderComposerExistingAttachments() {
        composerExistingAttachments.innerHTML = "";
        composerExistingAttachments.classList.toggle("hidden", composerExistingAttachmentState.length === 0);

        for (const attachment of composerExistingAttachmentState) {
            const button = document.createElement("button");
            button.type = "button";
            button.className = "attachment-pill";
            if (attachment.markedForRemoval) {
                button.classList.add("attachment-pill-removed");
            }
            button.textContent = `${attachment.kind === "image" ? "Bild" : "Audio"} · ${attachment.original_filename}`;
            button.addEventListener("click", () => {
                attachment.markedForRemoval = !attachment.markedForRemoval;
                renderComposerExistingAttachments();
            });
            composerExistingAttachments.appendChild(button);
        }
    }

    function renderPendingAttachments() {
        composerPendingAttachments.innerHTML = "";
        composerPendingAttachments.classList.toggle("hidden", pendingAttachmentFiles.length === 0);

        for (const [index, file] of pendingAttachmentFiles.entries()) {
            const button = document.createElement("button");
            button.type = "button";
            button.className = "attachment-pill attachment-pill-pending";
            button.textContent = `Neu · ${file.name} · ${formatFileSize(file.size)}`;
            button.addEventListener("click", () => {
                pendingAttachmentFiles = pendingAttachmentFiles.filter((_, candidateIndex) => candidateIndex !== index);
                renderPendingAttachments();
            });
            composerPendingAttachments.appendChild(button);
        }
    }

    async function removeMarkedAttachments() {
        const marked = composerExistingAttachmentState.filter((attachment) => attachment.markedForRemoval);
        for (const attachment of marked) {
            const response = await fetch(appUrl(`/api/attachments/${attachment.id}`), {method: "DELETE"});
            if (!response.ok) {
                throw new Error("Anhang konnte nicht gelöscht werden.");
            }
        }
        composerExistingAttachmentState = composerExistingAttachmentState.filter((attachment) => !attachment.markedForRemoval);
    }

    async function uploadPendingAttachments(entryId) {
        if (pendingAttachmentFiles.length === 0) {
            return;
        }
        const formData = new FormData();
        for (const file of pendingAttachmentFiles) {
            formData.append("files", file);
        }
        const response = await fetch(appUrl(`/api/entries/${entryId}/attachments`), {
            method: "POST",
            body: formData,
        });
        if (!response.ok) {
            const error = await response.json().catch(() => ({}));
            throw new Error(error.detail || "Anhänge konnten nicht hochgeladen werden.");
        }
        pendingAttachmentFiles = [];
        attachmentInput.value = "";
    }

    async function syncAttachments(entryId) {
        await removeMarkedAttachments();
        await uploadPendingAttachments(entryId);
        const response = await fetch(appUrl(`/api/entries/${entryId}`));
        if (!response.ok) {
            throw new Error("Aktualisierter Eintrag konnte nicht geladen werden.");
        }
        const entry = await response.json();
        composerExistingAttachmentState = entry.attachments.map((attachment) => ({...attachment, markedForRemoval: false}));
        renderComposerExistingAttachments();
        renderPendingAttachments();
        return entry;
    }

    function renderTagFilters(availableTags) {
        const tagsToRender = activeTag && !availableTags.includes(activeTag) ? [activeTag, ...availableTags] : availableTags;
        tagFilterList.innerHTML = "";
        const hasTags = tagsToRender.length > 0;
        tagFilterStrip.classList.toggle("hidden", !hasTags);
        clearTagFilterButton.classList.toggle("hidden", !activeTag);

        for (const tag of tagsToRender) {
            const button = document.createElement("button");
            button.type = "button";
            button.className = "tag-chip tag-chip-button";
            button.textContent = `#${tag}`;
            if (tag === activeTag) {
                button.classList.add("active");
            }
            button.addEventListener("click", () => loadEntries(currentDay, tag === activeTag ? null : tag, activeSearch));
            tagFilterList.appendChild(button);
        }
    }

    function normalizeSearchInput(value) {
        return value.trim().split(/\s+/).filter(Boolean).join(" ");
    }

    async function fetchEntries(day = null, tag = activeTag, search = activeSearch) {
        const params = new URLSearchParams();
        if (day) {
            params.set("day", day);
        }
        if (tag) {
            params.set("tag", tag);
        }
        if (search) {
            params.set("q", search);
        }
        const queryString = params.toString();
        const query = queryString ? `?${queryString}` : "";
        const response = await fetch(appUrl(`/api/entries${query}`));
        if (!response.ok) {
            throw new Error("Einträge konnten nicht geladen werden.");
        }
        return response.json();
    }

    function renderEntries(payload) {
        currentDay = payload.day;
        previousDay = payload.previous_day;
        nextDay = payload.next_day;
        activeTag = payload.active_tag;
        activeSearch = payload.active_search;
        if (document.activeElement !== searchInput) {
            searchInput.value = activeSearch || "";
        }
        clearSearchButton.classList.toggle("hidden", !activeSearch);
        updateDayButtons();
        renderTagFilters(payload.available_tags);

        const entries = payload.entries;
        entryCount.textContent = activeSearch
            ? `${entries.length} ${entries.length === 1 ? "Treffer" : "Treffer"} für "${activeSearch}"`
            : `${entries.length} ${entries.length === 1 ? "Eintrag" : "Einträge"}`;
        entriesList.innerHTML = "";

        if (entries.length === 0) {
            const card = document.createElement("article");
            card.className = "empty-card";

            const eyebrow = document.createElement("p");
            eyebrow.className = "eyebrow";
            eyebrow.textContent = "Leer";

            const heading = document.createElement("h3");
            heading.textContent = "Für diesen Tag gibt es noch keinen Eintrag.";

            const message = document.createElement("p");
            message.textContent = activeSearch
                ? `Für "${activeSearch}" gibt es hier keine Treffer.`
                : activeTag
                ? `Mit dem Tag #${activeTag} gibt es hier nichts.`
                : "Drück einfach C und schreib direkt los.";

            card.appendChild(eyebrow);
            card.appendChild(heading);
            card.appendChild(message);
            entriesList.appendChild(card);
            return;
        }

        for (const entry of entries) {
            const fragment = template.content.cloneNode(true);
            const card = fragment.querySelector(".entry-card");
            fragment.querySelector(".entry-date").textContent = formatTime(entry.created_at);
            fragment.querySelector(".entry-id").textContent = `#${entry.id}`;
            fragment.querySelector(".entry-content").textContent = entry.content;

            const tagContainer = fragment.querySelector(".entry-tags");
            if (entry.tags.length > 0) {
                tagContainer.classList.remove("hidden");
                for (const tag of entry.tags) {
                    const tagElement = document.createElement("span");
                    tagElement.className = "tag-chip";
                    tagElement.textContent = `#${tag}`;
                    tagContainer.appendChild(tagElement);
                }
            }

            const attachmentSection = fragment.querySelector(".entry-attachments");
            const attachmentGrid = fragment.querySelector(".attachment-grid");
            const attachmentPreview = fragment.querySelector(".attachment-preview");
            if (entry.attachments.length > 0) {
                attachmentSection.classList.remove("hidden");
                let activeAttachmentId = null;

                for (const attachment of entry.attachments) {
                    const button = document.createElement("button");
                    button.type = "button";
                    button.className = "attachment-tile";

                    if (attachment.kind === "image" && attachment.thumbnail_url) {
                        const image = document.createElement("img");
                        image.className = "attachment-thumb";
                        image.src = attachment.thumbnail_url;
                        image.alt = attachment.original_filename;
                        image.loading = "lazy";
                        button.appendChild(image);
                    } else if (attachment.kind === "image") {
                        const badge = document.createElement("span");
                        badge.className = "attachment-audio-icon";
                        badge.setAttribute("aria-hidden", "true");
                        badge.textContent = "RAW";
                        button.appendChild(badge);
                    } else {
                        const badge = document.createElement("span");
                        badge.className = "attachment-audio-icon";
                        badge.setAttribute("aria-hidden", "true");
                        badge.textContent = "♪";
                        button.appendChild(badge);
                    }

                    const label = document.createElement("span");
                    label.className = "attachment-label";
                    label.textContent = attachment.original_filename;
                    button.appendChild(label);

                    button.addEventListener("click", () => {
                        const alreadyOpen = activeAttachmentId === attachment.id;
                        activeAttachmentId = alreadyOpen ? null : attachment.id;
                        attachmentPreview.innerHTML = "";
                        attachmentPreview.classList.toggle("hidden", alreadyOpen);
                        attachmentGrid.querySelectorAll(".attachment-tile").forEach((tile) => tile.classList.remove("active"));
                        if (alreadyOpen) {
                            return;
                        }
                        button.classList.add("active");
                        if (attachment.kind === "image") {
                            if (attachment.thumbnail_url || ["image/jpeg", "image/png", "image/webp", "image/heic", "image/heif"].includes(attachment.mime_type)) {
                                const image = document.createElement("img");
                                image.className = "attachment-full";
                                image.src = attachment.thumbnail_url && ["image/x-adobe-dng", "image/dng"].includes(attachment.mime_type)
                                    ? attachment.thumbnail_url
                                    : attachment.file_url;
                                image.alt = attachment.original_filename;
                                attachmentPreview.appendChild(image);
                            } else {
                                const fallback = document.createElement("div");
                                fallback.className = "attachment-file-fallback";
                                const message = document.createElement("p");
                                message.textContent = "Dieses RAW-Bild kann dein Browser wahrscheinlich nicht direkt anzeigen.";
                                const link = document.createElement("a");
                                link.className = "ghost-link";
                                link.href = attachment.file_url;
                                link.target = "_blank";
                                link.rel = "noopener noreferrer";
                                link.textContent = "Originaldatei öffnen";
                                fallback.appendChild(message);
                                fallback.appendChild(link);
                                attachmentPreview.appendChild(fallback);
                            }
                        } else {
                            const audio = document.createElement("audio");
                            audio.controls = true;
                            audio.preload = "metadata";
                            audio.src = attachment.file_url;
                            attachmentPreview.appendChild(audio);
                        }
                    });

                    attachmentGrid.appendChild(button);
                }
            }

            const updateElement = fragment.querySelector(".entry-update");
            if (hasMeaningfulUpdate(entry.created_at, entry.updated_at)) {
                updateElement.textContent = `Update: ${formatTime(entry.updated_at)}`;
                updateElement.classList.remove("hidden");
            }

            card.querySelector('[data-action="edit"]').addEventListener("click", () => openComposer(entry));
            card.querySelector('[data-action="delete"]').addEventListener("click", async () => {
                const confirmed = window.confirm("Diesen Eintrag wirklich löschen?");
                if (!confirmed) {
                    return;
                }

                const response = await fetch(appUrl(`/api/entries/${entry.id}`), {method: "DELETE"});
                if (!response.ok) {
                    setStatus("Löschen fehlgeschlagen.", true);
                    return;
                }

                if (entryIdInput.value === String(entry.id)) {
                    closeComposer();
                }

                setStatus(`Eintrag #${entry.id} gelöscht.`);
                await loadEntries(currentDay, activeTag, activeSearch);
            });

            entriesList.appendChild(fragment);
        }
    }

    async function loadEntries(day = currentDay, tag = activeTag, search = activeSearch) {
        const selectedDay = day === null ? null : (typeof day === "string" ? day : currentDay);
        try {
            const payload = await fetchEntries(selectedDay, tag, search);
            renderEntries(payload);
        } catch (error) {
            entriesList.innerHTML = '<article class="empty-card error"><h3>Einträge konnten nicht geladen werden.</h3></article>';
        }
    }

    async function saveEntry() {
        const content = contentInput.value.trim();
        if (!content) {
            setStatus("Bitte erst etwas schreiben.", true);
            return;
        }

        const entryId = entryIdInput.value;
        const method = entryId ? "PUT" : "POST";
        const url = entryId ? appUrl(`/api/entries/${entryId}`) : appUrl("/api/entries");

        const response = await fetch(url, {
            method,
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(
                entryId
                    ? {content, tags: composerTags}
                    : {content, tags: composerTags, created_at: createdAtInput.value || null}
            ),
        });

        if (!response.ok) {
            const error = await response.json().catch(() => ({}));
            setStatus(error.detail || "Speichern fehlgeschlagen.", true);
            return;
        }

        let savedEntry = await response.json();
        try {
            savedEntry = await syncAttachments(savedEntry.id);
        } catch (error) {
            entryIdInput.value = String(savedEntry.id);
            composerMode.textContent = "Eintrag bearbeiten";
            composerTitle.textContent = `Eintrag #${savedEntry.id} anpassen.`;
            setStatus(error.message || "Anhänge konnten nicht gespeichert werden.", true);
            return;
        }
        const targetDay = entryId ? currentDay : null;
        closeComposer();
        setStatus(`Eintrag #${savedEntry.id} gespeichert.`);
        await loadEntries(targetDay, activeTag, activeSearch);
    }

    function isTypingContext() {
        const activeElement = document.activeElement;
        return activeElement instanceof HTMLTextAreaElement || activeElement instanceof HTMLInputElement || activeElement?.isContentEditable;
    }

    document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && !composerBackdrop.classList.contains("hidden")) {
            event.preventDefault();
            closeComposer();
            return;
        }

        if (
            event.key.toLowerCase() === "c" &&
            !event.ctrlKey &&
            !event.metaKey &&
            !event.altKey &&
            !isTypingContext()
        ) {
            event.preventDefault();
            openComposer();
        }
    });

    contentInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
            event.preventDefault();
            saveEntry();
        }
    });
    tagEntryInput.addEventListener("input", updateTagSuggestions);
    tagEntryInput.addEventListener("focus", updateTagSuggestions);
    tagEntryInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
            event.preventDefault();
            addCurrentTag();
        }
        if (event.key === "Escape") {
            hideTagSuggestions();
        }
    });
    tagEntryInput.addEventListener("blur", () => {
        window.setTimeout(hideTagSuggestions, 120);
    });
    attachmentInput.addEventListener("change", () => {
        const nextFiles = Array.from(attachmentInput.files || []);
        pendingAttachmentFiles = [...pendingAttachmentFiles, ...nextFiles];
        attachmentInput.value = "";
        renderPendingAttachments();
    });

    searchInput.addEventListener("input", () => {
        window.clearTimeout(searchDebounceTimer);
        searchDebounceTimer = window.setTimeout(() => {
            loadEntries(null, activeTag, normalizeSearchInput(searchInput.value) || null);
        }, 250);
    });
    searchInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
            event.preventDefault();
            window.clearTimeout(searchDebounceTimer);
            loadEntries(null, activeTag, normalizeSearchInput(searchInput.value) || null);
        }
        if (event.key === "Escape") {
            searchInput.value = "";
            window.clearTimeout(searchDebounceTimer);
            loadEntries(null, activeTag, null);
        }
    });

    refreshButton.addEventListener("click", () => loadEntries(currentDay, activeTag, activeSearch));
    previousDayButton.addEventListener("click", () => loadEntries(previousDay, activeTag, activeSearch));
    nextDayButton.addEventListener("click", () => loadEntries(nextDay, activeTag, activeSearch));
    openComposerButton.addEventListener("click", () => openComposer());
    closeComposerButton.addEventListener("click", closeComposer);
    cancelButton.addEventListener("click", closeComposer);
    saveButton.addEventListener("click", saveEntry);
    addTagButton.addEventListener("click", addCurrentTag);
    clearTagFilterButton.addEventListener("click", () => loadEntries(currentDay, null, activeSearch));
    clearSearchButton.addEventListener("click", () => {
        searchInput.value = "";
        window.clearTimeout(searchDebounceTimer);
        loadEntries(null, activeTag, null);
    });
    composerBackdrop.addEventListener("click", (event) => {
        if (event.target === composerBackdrop) {
            closeComposer();
        }
    });
    window.addEventListener("online", updateNetworkStatus);
    window.addEventListener("offline", updateNetworkStatus);

    if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
            navigator.serviceWorker.register(serviceWorkerPath, {
                scope: rootPath ? `${rootPath}/` : "/",
            }).catch(() => {});
        });
    }

    updateNetworkStatus();
    loadEntries();
</script>
</body>
</html>
