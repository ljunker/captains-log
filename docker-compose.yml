services:
  app:
    image: ${DOCKER_IMAGE_REPOSITORY:-kryptikker/captains-log}:${DOCKER_IMAGE_VERSION:-latest}
    pull_policy: always
    container_name: captains-log-app
    environment:
      DATABASE_URL: sqlite:////data/captains_log.db
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      API_KEY: ${API_KEY:-}
      APP_ROOT_PATH: ${APP_ROOT_PATH:-}
    ports:
      - "127.0.0.1:${HOST_PORT:-8000}:8000"
    volumes:
      - captains_log_data:/data
    restart: unless-stopped

volumes:
  captains_log_data:
    name: captains_log_data
